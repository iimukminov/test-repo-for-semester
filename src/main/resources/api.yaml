openapi: 3.0.3
info:
  title: MentorFlow API
  version: 1.0.0
  description: REST API for Mentorship and Consultations platform
paths:
  /users:
    get:
      tags:
        - Users
      summary: Get all users
      operationId: getAllUsers
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserDto'
    post:
      tags:
        - Users
      summary: Create new user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateDto'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        '404':
          description: User not found
    delete:
      tags:
        - Users
      summary: Delete user
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: User successfully deleted

  /roadmaps:
    get:
      tags:
        - Roadmaps
      summary: Get list of roadmaps (optionally filtered by mentor or mentee)
      operationId: getRoadmaps
      parameters:
        - name: mentorId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: menteeId
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoadmapDto'
    post:
      tags:
        - Roadmaps
      summary: Create a new roadmap
      operationId: createRoadmap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoadmapCreateDto'
      responses:
        '201':
          description: Roadmap created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoadmapDto'

  /roadmaps/{id}:
    get:
      tags:
        - Roadmaps
      summary: Get roadmap by ID
      operationId: getRoadmapById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoadmapDto'
        '404':
          description: Roadmap not found
    delete:
      tags:
        - Roadmaps
      summary: Delete roadmap
      operationId: deleteRoadmap
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Roadmap successfully deleted

  /roadmaps/{roadmapId}/steps:
    get:
      tags:
        - Roadmap Steps
      summary: Get all steps for a specific roadmap
      operationId: getRoadmapSteps
      parameters:
        - name: roadmapId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoadmapStepDto'
    post:
      tags:
        - Roadmap Steps
      summary: Add a new step to a roadmap
      operationId: addStepToRoadmap
      parameters:
        - name: roadmapId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoadmapStepCreateDto'
      responses:
        '201':
          description: Step created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoadmapStepDto'

  /steps/{id}:
    get:
      tags:
        - Roadmap Steps
      summary: Get step by ID
      operationId: getStepById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoadmapStepDto'
    delete:
      tags:
        - Roadmap Steps
      summary: Delete step
      operationId: deleteStep
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Step successfully deleted

  /steps/{id}/status:
    patch:
      tags:
        - Roadmap Steps
      summary: Change step status
      operationId: changeStepStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoadmapStepStatusUpdateDto'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoadmapStepDto'

components:
  schemas:
    UserDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
        githubUsername:
          type: string

    UserCreateDto:
      type: object
      required:
        - username
        - password
        - email
      properties:
        username:
          type: string
        password:
          type: string
        email:
          type: string
        githubUsername:
          type: string

    RoadmapDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        uuid:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        mentorId:
          type: integer
          format: int64
        mentorUsername:
          type: string
        menteeId:
          type: integer
          format: int64
        menteeUsername:
          type: string

    RoadmapCreateDto:
      type: object
      required:
        - mentorId
        - menteeId
        - title
      properties:
        mentorId:
          type: integer
          format: int64
        menteeId:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string

    RoadmapStepDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        uuid:
          type: string
          format: uuid
        stepOrder:
          type: integer
        title:
          type: string
        contentLink:
          type: string
        requiredCommits:
          type: integer
        status:
          type: string
          description: "Enum: LOCKED, IN_PROGRESS, REVIEW, DONE"
        roadmapId:
          type: integer
          format: int64

    RoadmapStepCreateDto:
      type: object
      required:
        - stepOrder
        - title
      properties:
        stepOrder:
          type: integer
        title:
          type: string
        contentLink:
          type: string
        requiredCommits:
          type: integer

    RoadmapStepStatusUpdateDto:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: "Enum: LOCKED, IN_PROGRESS, REVIEW, DONE"